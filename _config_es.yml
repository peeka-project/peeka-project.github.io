title: Peeka
description: "Peeka - Herramienta de diagnóstico en tiempo de ejecución para Python usando observación de funciones no intrusiva basada en PEP 768"
peeka_version: "0.1.13"
baseurl: "/es"
url: "https://peeka-project.github.io"
theme: just-the-docs
color_scheme: light

destination: "_site_es"

# Logo and favicon
logo: "https://peeka-project.github.io/assets/images/logo.png"

# Enable search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation
nav_sort: case_insensitive


# Back to top link
back_to_top: true
back_to_top_text: "Volver al inicio"

aux_links:
  "中文":
    - "/"
  "English":
    - "/en/"
  "日本語":
    - "/ja/"
  "GitHub":
    - "https://github.com/peeka-project/peeka"

social:
  github: peeka-project/peeka

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "default"

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache

exclude:
  - node_modules/
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - README.md
  - en/
  - ja/
