title: Peeka
description: "Peeka - Python Runtime Diagnostic Tool with Non-Invasive Function Observation based on PEP 768"
baseurl: "/peeka"
url: "https://wwulfric.github.io"
theme: just-the-docs
color_scheme: light

destination: "_site_en"

logo: "/assets/images/logo.png"

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

nav_sort: case_insensitive


back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  "中文":
    - "/peeka/"
  "日本語":
    - "/peeka/ja/"
  "Español":
    - "/peeka/es/"
  "GitHub":
    - "https://github.com/wwulfric/peeka"

social:
  github: wwulfric/peeka

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "default"

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache

exclude:
  - node_modules/
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - README.md
