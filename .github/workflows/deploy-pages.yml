name: Deploy GitHub Pages

on:
  push:
    branches: ["master", "main"]
    paths:
      - '**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create Gemfile if not exists
        run: |
          if [ ! -f Gemfile ]; then
            cat > Gemfile << 'EOF'
          source "https://rubygems.org"

          gem "jekyll", "~> 4.3"
          gem "just-the-docs", "~> 0.8"
          gem "jekyll-seo-tag", "~> 2.8"
          gem "jekyll-github-metadata", "~> 2.16"
          gem "jekyll-include-cache", "~> 0.2"
          gem "erb"
          EOF
          fi

      - name: Install dependencies
        run: |
          bundle install

      - name: Build Chinese site
        run: bundle exec jekyll build --baseurl "/peeka-docs"
        env:
          JEKYLL_ENV: production

      - name: Build English site
        run: bundle exec jekyll build --config _config_en.yml --source en --destination _site/en --baseurl "/peeka-docs"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
