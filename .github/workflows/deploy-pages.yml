name: Deploy GitHub Pages

on:
  push:
    branches: ["master", "main"]
    paths:
      - '**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build Chinese site
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Build English site
        run: bundle exec jekyll build --config _config_en.yml --source en --destination _site/en --baseurl "/en"
        env:
          JEKYLL_ENV: production

      - name: Build Spanish site
        run: bundle exec jekyll build --config _config_es.yml --source es --destination _site/es --baseurl "/es"
        env:
          JEKYLL_ENV: production

      - name: Build Japanese site
        run: bundle exec jekyll build --config _config_ja.yml --source ja --destination _site/ja --baseurl "/ja"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
