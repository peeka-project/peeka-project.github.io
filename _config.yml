# GitHub Pages Configuration for Peeka
title: Peeka
description: Python 运行时诊断工具 - 基于 PEP 768 的非侵入式函数观测
peeka_version: "0.1.16"
baseurl: ""
url: "https://peeka-project.github.io"
theme: just-the-docs
color_scheme: light

# Logo and favicon
logo: "https://peeka-project.github.io/assets/images/logo.png"

# Enable search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation
nav_sort: case_insensitive

# Footer (dynamic year via _includes/footer_custom.html)

# Back to top link
back_to_top: true
back_to_top_text: "回到顶部"

# Auxiliary links
aux_links:
  "English":
    - "/en/"
  "日本語":
    - "/ja/"
  "Español":
    - "/es/"
  "GitHub":
    - "https://github.com/peeka-project/peeka"

# Google Analytics (optional)
# ga_tracking: UA-XXXXXXXXX-X

# Social links (optional)
social:
  github: peeka-project/peeka

# Code highlighting
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Collections
collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "default"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache

# Exclude from processing
exclude:
  - node_modules/
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - en/
  - es/
  - ja/
